<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="El Rincón Artesanal - Piezas de barro hechas a mano por Luis Manuel Rodríguez Peña. Compras por WhatsApp y SMS en Cuba.">
    <title>El Rincón Artesanal – Inicio</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <!-- Carga del tema (sin parpadeo) -->
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = 'css/themes/' + theme + '.css';
            document.head.appendChild(link);
        })();
    </script>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components/navigation.css">
    <link rel="stylesheet" href="css/components/header.css">
    <link rel="stylesheet" href="css/components/footer.css">
    <link rel="stylesheet" href="css/components/buttons.css">
    <link rel="stylesheet" href="css/components/cards.css">
    <link rel="stylesheet" href="css/pages/home.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div id="site-header"></div>
    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>El Rincón Artesanal</h1>
                <p>Piezas de barro únicas, hechas a mano con el alma de la tierra.</p>
                <a href="pages/products.html" class="btn btn-primary">Ver catálogo</a>
            </div>
        </section>
        <section class="featured-products">
            <h2>Productos destacados</h2>
            <div id="featured-list" class="products-grid"></div>
            <a href="pages/products.html" class="btn btn-outline">Todos los productos</a>
        </section>
    </main>
    <div id="site-footer"></div>

    <script src="js/config.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/components/navigation.js"></script>
    <script src="js/main.js"></script>
    <script src="js/pages/home.js"></script>
</body>
</html>
