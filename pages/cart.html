<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito – El Rincón Artesanal</title>
    <link rel="icon" href="../favicon.ico">
    <link rel="stylesheet" href="../css/normalize.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components/navigation.css">
    <link rel="stylesheet" href="../css/components/header.css">
    <link rel="stylesheet" href="../css/components/footer.css">
    <link rel="stylesheet" href="../css/components/buttons.css">
    <link rel="stylesheet" href="../css/components/forms.css">
    <link rel="stylesheet" href="../css/components/modals.css">
    <link rel="stylesheet" href="../css/pages/cart.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div id="site-header"></div>
    <main class="container">
        <h1>Tu carrito</h1>
        <div id="cart-items"></div>
        <div id="cart-total"></div>
        <button id="checkout-btn" class="btn btn-primary">Realizar pedido</button>
    </main>

    <!-- Modal para teléfono -->
    <div id="order-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('order-modal')">&times;</button>
            <h2>Completa tu pedido</h2>
            <label>Tu número de teléfono (Cuba):</label>
            <input type="tel" id="order-phone" placeholder="+53XXXXXXXX" required>
            <button onclick="realizarPedido()" class="btn btn-primary">Enviar por WhatsApp y SMS</button>
        </div>
    </div>

    <div id="site-footer"></div>
    <script src="../js/config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/order.js"></script>
    <script src="../js/components/modal.js"></script>
    <script src="../js/components/navigation.js"></script>
    <script src="../js/main.js"></script>
    <script>
        // Renderizar carrito
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const checkoutBtn = document.getElementById('checkout-btn');
            
            function renderCart() {
                if (cart.items.length === 0) {
                    container.innerHTML = '<p>Tu carrito está vacío.</p>';
                    totalEl.innerHTML = '';
                    checkoutBtn.style.display = 'none';
                    return;
                }
                checkoutBtn.style.display = 'inline-block';
                container.innerHTML = cart.items.map(item => {
                    const tier = CONFIG.discounts.tiers.find(t => item.quantity >= t.minQty);
                    const unitPrice = tier ? item.price * (1 - tier.discount) : item.price;
                    const subtotal = unitPrice * item.quantity;
                    return `<div class="cart-item">
                        <span>${item.name} (x${item.quantity})</span>
                        <span>$${subtotal.toFixed(2)}</span>
                        <button onclick="cart.remove(${item.id});renderCart();">Eliminar</button>
                    </div>`;
                }).join('');
                totalEl.innerHTML = `<strong>Total: $${cart.getTotal().toFixed(2)} CUP</strong>`;
            }
            window.renderCart = renderCart;
            renderCart();

            checkoutBtn.addEventListener('click', () => {
                if (cart.items.length === 0) return alert('Carrito vacío');
                openModal('order-modal');
            });
        });
    </script>
</body>
</html>
