<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo – El Rincón Artesanal</title>
    <link rel="icon" href="../favicon.ico">
    <link rel="stylesheet" href="../css/normalize.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components/navigation.css">
    <link rel="stylesheet" href="../css/components/header.css">
    <link rel="stylesheet" href="../css/components/footer.css">
    <link rel="stylesheet" href="../css/components/buttons.css">
    <link rel="stylesheet" href="../css/components/cards.css">
    <link rel="stylesheet" href="../css/pages/products.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div id="site-header"></div>
    <main class="container">
        <h1>Nuestras piezas</h1>
        <div id="assistant-container">
            <button id="start-assistant" class="btn btn-outline" onclick="startAssistant()">🧑‍🏫 Asistente de selección</button>
            <div id="assistant-content"></div>
        </div>
        <div id="all-products" class="products-grid"></div>
    </main>
    <div id="site-footer"></div>

    <script src="../js/config.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/assistant.js"></script>
    <script src="../js/components/navigation.js"></script>
    <script src="../js/main.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('all-products');
            if (!container) return;

            if (!window.CONFIG || !window.CONFIG.products) {
                container.innerHTML = '<p>Error: no se pudo cargar la información de productos.</p>';
                return;
            }

            const productos = window.CONFIG.products;

            if (productos.length === 0) {
                container.innerHTML = '<p>No hay productos disponibles en este momento.</p>';
                return;
            }

            // Detectar si estamos en pages/ para ajustar la ruta de las imágenes
            const isInPages = window.location.pathname.includes('/pages/');
            const basePath = isInPages ? '../' : '';

            container.innerHTML = productos.map(p => `
                <div class="product-card">
                    <div class="image-wrapper">
                        <img src="${basePath}${p.image}" alt="${p.name}" loading="lazy">
                    </div>
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p>${p.description}</p>
                        <span class="price">$${p.price} CUP</span>
                        <a href="product-detail.html?id=${p.id}" class="btn btn-primary">Ver</a>
                    </div>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
