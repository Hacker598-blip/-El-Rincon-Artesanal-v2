<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del producto – El Rincón Artesanal</title>
    <link rel="icon" href="../favicon.ico">
    <link rel="stylesheet" href="../css/normalize.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components/navigation.css">
    <link rel="stylesheet" href="../css/components/header.css">
    <link rel="stylesheet" href="../css/components/footer.css">
    <link rel="stylesheet" href="../css/components/buttons.css">
    <link rel="stylesheet" href="../css/pages/product-detail.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div id="site-header"></div>
    <main class="container product-detail">
        <div class="gallery">
            <img id="product-img" src="" alt="" class="main-image">
            <div class="gallery-controls">
                <button onclick="sliderPrev()" class="btn btn-outline btn-small">◀</button>
                <button onclick="sliderNext()" class="btn btn-outline btn-small">▶</button>
            </div>
        </div>
        <div class="product-info-panel">
            <h1 id="product-name"></h1>
            <p id="product-desc"></p>
            <span id="product-price" class="price"></span>
            <div class="discount-box">
                <h4>Descuentos por volumen</h4>
                <ul id="discount-info"></ul>
            </div>
            <div class="quantity-selector">
                <label for="quantity">Cantidad:</label>
                <input type="number" id="quantity" value="1" min="1">
            </div>
            <button id="add-to-cart" class="btn btn-primary">Añadir al carrito</button>
            <button onclick="window.history.back()" class="btn btn-outline btn-small" style="margin-top:1rem;">← Volver</button>
        </div>
    </main>
    <div id="site-footer"></div>
    <script src="../js/config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/components/slider.js"></script>
    <script src="../js/components/navigation.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/pages/product-detail.js"></script>
</body>
</html>
