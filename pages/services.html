<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios – El Rincón Artesanal</title>
    <link rel="icon" href="../favicon.ico">
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            const link = document.createElement('link');
            link.rel = 'stylesheet'; link.href = '../css/themes/' + theme + '.css';
            link.setAttribute('data-theme-link', '');
            document.head.appendChild(link);
        })();
    </script>
    <link rel="stylesheet" href="../css/normalize.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components/navigation.css">
    <link rel="stylesheet" href="../css/components/header.css">
    <link rel="stylesheet" href="../css/components/footer.css">
    <link rel="stylesheet" href="../css/components/buttons.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div id="site-header"></div>
    <main class="container">
        <h1>Servicios</h1>
        <ul>
            <li>Piezas personalizadas por encargo (color, tamaño, grabados).</li>
            <li>Envíos a toda Cuba mediante agencia.</li>
            <li>Asesoría para decoración con barro.</li>
            <li>Reventa con condiciones especiales para emprendedores.</li>
        </ul>
    </main>
    <div id="site-footer"></div>
    <script src="../js/config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/components/navigation.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
